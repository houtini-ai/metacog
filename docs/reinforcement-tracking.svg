<svg width="800" height="550" viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg">
  <title>Reinforcement Tracking Diagram</title>
  <desc>Shows how Metacog prevents rule decay using suppression tracking</desc>
  <style>
    text { font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace; font-size: 14px; fill: #ffffff; }
    .label-small { font-size: 12px; opacity: 0.8; }
    .cyan { fill: #06b6d4; stroke: #06b6d4; }
    .green { fill: #22c55e; stroke: #22c55e; }
    .red { stroke: #ef4444; fill: none; }
    .ghost { stroke: #ffffff; stroke-dasharray: 4; fill: none; opacity: 0.3; }
    .box { stroke-width: 1; fill: none; }
    .heading { font-weight: bold; font-size: 16px; }
  </style>

  <!-- Background -->
  <rect width="800" height="550" fill="#0f172a" />

  <!-- LEFT PATH: Detection -->
  <g transform="translate(100, 40)">
    <text x="100" y="20" text-anchor="middle" class="cyan heading">DETECTION</text>
    <path d="M100,40 V160" stroke="#06b6d4" stroke-width="2" fill="none" />
    <circle cx="100" cy="50" r="4" class="cyan" />
    <text x="110" y="55" class="label-small">Pattern fires</text>
    <rect x="70" y="90" width="60" height="30" class="cyan box" rx="4" />
    <text x="100" y="110" text-anchor="middle" class="label-small">Failure</text>
    <text x="100" y="185" text-anchor="middle" class="cyan">+1 Detection</text>
  </g>

  <!-- RIGHT PATH: Suppression -->
  <g transform="translate(500, 40)">
    <text x="100" y="20" text-anchor="middle" class="green heading">SUPPRESSION</text>
    <path d="M100,40 V160" stroke="#22c55e" stroke-width="2" fill="none" />
    <circle cx="100" cy="50" r="4" class="green" />
    <text x="110" y="55" class="label-small">Pattern silent + Rule active</text>
    <circle cx="100" cy="105" r="20" class="ghost" />
    <text x="130" y="110" class="label-small" fill-opacity="0.6">Prevented</text>
    <text x="100" y="185" text-anchor="middle" class="green">+1 Suppression</text>
  </g>

  <!-- CENTER: Evidence & Confidence -->
  <g transform="translate(300, 240)">
    <rect x="0" y="0" width="200" height="80" stroke="#ffffff" fill="#1e293b" rx="8" />
    <text x="100" y="25" text-anchor="middle" font-weight="bold">EVIDENCE BOX</text>
    <text x="100" y="45" text-anchor="middle" class="label-small" fill="#22c55e">Confidence Grows</text>
    <!-- Simple Bar Chart -->
    <g transform="translate(70, 55)">
      <rect x="0" y="10" width="15" height="10" fill="#22c55e" />
      <rect x="20" y="5" width="15" height="15" fill="#22c55e" />
      <rect x="40" y="0" width="15" height="20" fill="#22c55e" />
      <rect x="60" y="0" width="15" height="20" fill="#22c55e" />
    </g>
    <path d="M-100,-30 L50,0 M300,-30 L150,0" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  </g>

  <!-- Decay Logic -->
  <text x="400" y="360" text-anchor="middle" class="label-small" fill="#94a3b8">Only truly dormant rules decay (60+ days inactive)</text>

  <!-- BOTTOM: Comparison -->
  <g transform="translate(50, 420)">
    <!-- Naive Decay -->
    <text x="150" y="-10" text-anchor="middle" class="label-small">Naive Decay</text>
    <path d="M50,50 Q75,10 100,50 T150,50 T200,50 T250,50" class="red" stroke-width="2" />
    <text x="150" y="70" text-anchor="middle" class="label-small" fill="#ef4444">learns, forgets, learns, forgets</text>
    
    <!-- Reinforcement Tracking -->
    <text x="550" y="-10" text-anchor="middle" class="label-small">Reinforcement Tracking</text>
    <line x1="450" y1="15" x2="650" y2="15" stroke="#22c55e" stroke-width="3" />
    <text x="550" y="70" text-anchor="middle" class="label-small" fill="#22c55e">learns, reinforces, retains</text>
  </g>

  <!-- Main Caption -->
  <text x="400" y="530" text-anchor="middle" font-size="18px" fill="#ffffff">"Rules that work get stronger, not stale."</text>
</svg>